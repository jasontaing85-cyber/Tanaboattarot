<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أسرار البازل الـ 12 الروحانية</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-deep: #0a0705;
            --surface-panel: #16100c;
            --gold-glow: #e5b869;
            --gold-dark: #b68b3e;
            --text-pure: #faf6f0;
            --text-dim: #9e9182;
            --border-mystic: #36261b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-pure);
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-wrapper {
            width: 100%;
            max-width: 450px;
            background: var(--surface-panel);
            border: 1px solid var(--border-mystic);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }

        /* الإحصائيات العلوية */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--border-mystic);
            margin-bottom: 16px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--gold-glow);
        }

        /* معلومات اللغز الحالي */
        .puzzle-meta {
            text-align: center;
            margin-bottom: 16px;
        }

        .puzzle-title {
            color: var(--gold-glow);
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        /* شبكة البازل */
        .puzzle-board {
            width: 100%;
            aspect-ratio: 4 / 8; /* للحصول على 32 قطعة (4 أفقياً × 8 عمودياً) */
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            background: #000;
            border: 2px solid var(--border-mystic);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .puzzle-piece {
            background-color: #221710;
            border: 1px solid rgba(229, 184, 105, 0.15);
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: rgba(255,255,255,0.15);
        }

        .puzzle-piece.selected {
            outline: 2px solid var(--gold-glow);
            outline-offset: -2px;
            transform: scale(0.96);
            background-color: #3d2a1d;
        }

        /* المكافآت وقسم التواصل */
        .reward-section {
            background: rgba(229, 184, 105, 0.04);
            border: 1px dashed var(--gold-dark);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            margin-top: 10px;
        }

        .reward-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2b9348, #155d27);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            text-decoration: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(43, 147, 72, 0.3);
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold-glow), var(--gold-dark));
            color: #120c06;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 8px;
        }

        /* الجملة الروحانية المستترة */
        .quote-banner {
            display: none;
            background: #112211;
            border: 1px solid #2b9348;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            color: #85e39d;
            font-weight: bold;
            margin-bottom: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <!-- شريط المؤشرات العلوي -->
    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-label">المستوى</span>
            <span class="stat-value" id="levelVal">1 / 12</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">الوقت المتبقي</span>
            <span class="stat-value" id="timerVal">20:00</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">عملات Tanrot</span>
            <span class="stat-value" id="coinsVal">0 🪙</span>
        </div>
    </div>

    <!-- تفاصيل اللغز -->
    <div class="puzzle-meta">
        <div class="puzzle-title" id="puzzleTitle">البازل الروحاني الأول</div>
        <p class="subtitle" style="font-size: 12px; color: var(--text-dim);">رتب الـ 32 قطعة بشكل صحيح لكشف المعرفة الباطنية المحجوبة.</p>
    </div>

    <!-- لافتة الجملة الروحانية المكتشفة -->
    <div class="quote-banner" id="quoteBanner"></div>

    <!-- لوحة التحكم بالقطع -->
    <div class="puzzle-board" id="board"></div>

    <button class="action-btn" id="controlBtn" onclick="initLevel()">بدء وتوزيع عشوائي للمستوى</button>

    <!-- قسم المكافآت عند الوصول لـ 1000 عملة -->
    <div class="reward-section">
        <p id="rewardHint" style="font-size: 12px; color: var(--text-dim); margin-bottom: 8px;">اجمع 1000 عملة ذهبية بإنهاء 5 بازلات لفتح قراءة المصير الفلكي والعلاج.</p>
        <a href="https://t.me/AstroHeal1" target="_blank" class="reward-btn" id="claimBtn">
            🔮 استلام المكافأة الروحانية (تواصل مع الدعم)
        </a>
    </div>
</div>

<script>
    // تهيئة منصة تليجرام
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }

    // المصفوفة الـ 12 للجمل الباطنية الروحانية العميقة
    const spiritualQuotes = [
        "الصمت هو المساحة النورانية التي تتحدث فيها الروح بحرّية وعمق.",
        "ما تبحث عنه يبحث عنك في زوايا الإدراك الخفي، فكن مستعداً.",
        "النور المحجوب بداخل العتمة لا ينطفئ، بل ينتظر التوازن ليفيض.",
        "كل عقبة في مسارك الطيني هي بوابة تفتح وعيك لدرجات التطهير الأعلى.",
        "عندما تتصل بجوهرك الساكن، تتلاشى أوهام المادة وتنجلي الحقائق الكونية.",
        "الشفاء لا يأتي من الخارج، بل بتفكيك العُقد المترسبة في فلكك الداخلي.",
        "مسارات السفر الحقيقية هي التي تقطعها الروح لفهم أبعادها الروحانية.",
        "طاقة الوفرة تتبع النوايا المصفّاة من الشك والمشحونة باليقين الصادق.",
        "انعكاس مرآتك الداخلية يحدد جودة العوالم التي تجذبها إلى واقعك.",
        "الحكمة باقة تنمو في تربة التجارب القاسية والقبول الروحي العميق.",
        "التحرر من قيود الخوف هو الدرع الأقوى ضد طاقات السحر والظلام السفلية.",
        "أنت لست قطرة في محيط، أنت المحيط الروحاني بأكمله في قطرة متجسدة."
    ];

    let currentLevel = 0;
    let coins = 0;
    let timerInterval = null;
    let timeLeft = 1200; // 20 دقيقة بالثواني
    let piecesArray = [];
    let selectedPieceIndex = null;
    let isGameRunning = false;

    // توليد مصفوفة من 32 قطعة وخلطها عشوائياً بشكل مختلف تماماً في كل مرة
    function shufflePieces() {
        let arr = [];
        for (let i = 0; i < 32; i++) {
            arr.push(i);
        }
        
        // خوارزمية Fisher-Yates للخلط العشوائي الحقيقي والمختلف في كل مرة
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // بناء وتوزيع مستوى البازل في كل مرة
    function initLevel() {
        clearInterval(timerInterval);
        timeLeft = 1200; // إعادة العداد إلى 20 دقيقة
        isGameRunning = true;
        document.getElementById('quoteBanner').style.display = "none";
        document.getElementById('controlBtn').innerText = "إعادة توزيع القطع عشوائياً";

        // تحديث النصوص والواجهة واجهة اللغز الحالية
        document.getElementById('levelVal').innerText = `${currentLevel + 1} / 12`;
        document.getElementById('puzzleTitle').innerText = `البازل الروحاني #${currentLevel + 1}`;

        piecesArray = shufflePieces();
        renderBoard();
        startTimer();
    }

    // رسم اللوحة والقطع برمجياً
    function renderBoard() {
        const board = document.getElementById('board');
        board.innerHTML = "";

        piecesArray.forEach((pieceValue, index) => {
            const piece = document.createElement('div');
            piece.classList.add('puzzle-piece');
            piece.innerText = pieceValue + 1; // إظهار الرقم التعريفي للقطعة لمساعدة الذاكرة البصرية

            // لو كانت القطعة في مكانها الصحيح تماماً، نعطيها تلميحاً لونياً خفيفاً جداً دلالة على الدقة
            if (pieceValue === index) {
                piece.style.borderColor = "rgba(43, 147, 72, 0.4)";
            }

            piece.addEventListener('click', () => handlePieceClick(index));
            board.appendChild(piece);
        });
    }

    // إدارة نقرات التبديل بين القطع الـ 32
    function handlePieceClick(index) {
        if (!isGameRunning) return;

        if (selectedPieceIndex === null) {
            selectedPieceIndex = index;
            document.querySelectorAll('.puzzle-piece')[index].classList.add('selected');
        } else {
            // عملية التبديل الفيزيائي بين القطعتين في المصفوفة العشوائية
            const firstIndex = selectedPieceIndex;
            const secondIndex = index;

            [piecesArray[firstIndex], piecesArray[secondIndex]] = [piecesArray[secondIndex], piecesArray[firstIndex]];
            
            selectedPieceIndex = null;
            renderBoard();
            checkWinCondition();
        }
    }

    // فحص الفوز: هل تطابقت جميع الفهارس من 0 لـ 31 مع القيم؟
    function checkWinCondition() {
        let hasWon = true;
        for (let i = 0; i < 32; i++) {
            if (piecesArray[i] !== i) {
                hasWon = false;
                break;
            }
        }

        if (hasWon) {
            isGameRunning = false;
            clearInterval(timerInterval);
            
            // إضافة المكافأة المالية الكونية
            coins += 200;
            document.getElementById('coinsVal').innerText = `${coins} 🪙`;

            // إظهار الحكمة المستورة المكتشفة من البازل
            const banner = document.getElementById('quoteBanner');
            banner.innerText = `🔓 تم فك الشفرة بنجاح! الجملة الروحانية الباطنية: \n"${spiritualQuotes[currentLevel]}"`;
            banner.style.display = "block";

            // فحص فتح خانة الدعم للحصول على التحليل الشامل عند تجميع 5 بازلات (1000 عملة)
            if (coins >= 1000) {
                document.getElementById('claimBtn').style.display = "flex";
                document.getElementById('rewardHint').innerHTML = "🎉 تهانينا! لقد حققت 1000 عملة <b>Tanrot</b>. اضغط على الزر أدناه للتواصل مع الدعم وتلقي قراءتك الشاملة وعلاجك الروحاني فوراً.";
            }

            // الانتقال التلقائي للمستوى التالي إذا توفر
            if (currentLevel < 11) {
                currentLevel++;
                document.getElementById('controlBtn').innerText = `الانتقال للبازل الـ ${currentLevel + 1}`;
            } else {
                document.getElementById('controlBtn').innerText = "لقد أكملت جميع الأسرار الـ 12 بنجاح!";
                document.getElementById('controlBtn').disabled = true;
            }
        }
    }

    // عداد الـ 20 دقيقة العكسي
    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                isGameRunning = false;
                document.getElementById('timerVal').innerText = "انتهى الوقت";
                alert("انتهت الـ 20 دقيقة دون كشف المعرفة. أعد المحاولة وتوزيع القطع من جديد!");
            } else {
                timeLeft--;
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                document.getElementById('timerVal').innerText = 
                    `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            }
        }, 1000);
    }
</script>

</body>
</html>
