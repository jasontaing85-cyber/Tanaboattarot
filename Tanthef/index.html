<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طقس تنظيف الهالة والشفاء</title>
    <!-- مكتبة Telegram Web App (محفوظة كـ optional — نحمي الاستدعاءات إذا لم تكن متاحة) -->
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    <style>
        :root {
            --bg-purple: linear-gradient(135deg, #090514 0%, #160a24 50%, #090514 100%);
            --bg-gold: linear-gradient(135deg, #1a1102 0%, #382405 50%, #1a1102 100%);
            --crystal-purple-3d: radial-gradient(circle at 35% 35%, #f3e8ff 0%, #c084fc 20%, #7e22ce 55%, #3b0764 85%, #1e0038 100%);
            --crystal-gold-3d: radial-gradient(circle at 35% 35%, #ffffff 0%, #fef08a 20%, #eab308 55%, #854d0e 85%, #422006 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-purple);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            transition: background 2s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            z-index: 5;
        }

        h2 {
            font-size: 1.5rem;
            margin: 15px 0 10px 0;
            color: #e0b0ff;
            text-shadow: 0 0 15px rgba(224, 176, 255, 0.6);
            transition: color 2s ease, text-shadow 2s ease;
        }

        .timer-badge {
            position: absolute;
            top: 15px;
            right: 15px; /* في RTL من الأفضل أن تكون الزاوية اليمنى */
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(224, 176, 255, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #d8b4fe;
            display: none;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .timer-badge.active {
            display: block;
            animation: pulse-border 2s infinite;
        }

        .ritual-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(224, 176, 255, 0.15);
            border-radius: 16px;
            padding: 15px;
            width: 100%;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
            margin-top: 10px;
            transition: border-color 2s ease;
        }

        .instruction {
            font-size: 0.95rem;
            color: #c084fc;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .incantation {
            font-size: 1rem;
            line-height: 1.7;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        .crystal-ball-container {
            margin: 30px 0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .crystal-ball {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: var(--crystal-purple-3d);
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.6), inset -15px -15px 40px rgba(0, 0, 0, 0.8), inset 15px 15px 30px rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: background 2s ease, box-shadow 2s ease, transform 0.2s;
            animation: float-glow-purple 4s ease-in-out infinite;
            position: relative;
            outline: none;
        }

        .crystal-ball::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 50px;
            height: 28px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: rotate(-30deg);
            filter: blur(1px);
        }

        .crystal-ball.gold {
            background: var(--crystal-gold-3d);
            animation: float-glow-gold 4s ease-in-out infinite;
        }

        @keyframes float-glow-purple {
            0%, 100% { transform: translateY(0) scale(1); box-shadow: 0 0 40px rgba(168, 85, 247, 0.5), inset -15px -15px 40px rgba(0, 0, 0, 0.8), inset 15px 15px 30px rgba(255, 255, 255, 0.5); }
            50% { transform: translateY(-6px) scale(1.03); box-shadow: 0 0 70px rgba(192, 132, 252, 0.9), inset -15px -15px 40px rgba(0, 0, 0, 0.7), inset 15px 15px 40px rgba(255, 255, 255, 0.6); }
        }

        @keyframes float-glow-gold {
            0%, 100% { transform: translateY(0) scale(1); box-shadow: 0 0 50px rgba(234, 179, 8, 0.6), inset -15px -15px 40px rgba(0, 0, 0, 0.8), inset 15px 15px 30px rgba(255, 255, 255, 0.5); }
            50% { transform: translateY(-6px) scale(1.03); box-shadow: 0 0 85px rgba(254, 240, 138, 1), inset -15px -15px 40px rgba(0, 0, 0, 0.7), inset 15px 15px 40px rgba(255, 255, 255, 0.7); }
        }

        .action-btn {
            display: none;
            background: linear-gradient(90deg, #d4af37, #f5d061);
            color: #1a1102;
            border: none;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(214, 175, 55, 0.4);
            width: 85%;
            transition: transform 0.2s;
        }

        .sparkles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffffff, 0 0 30px #ffffff;
            animation: flash 2.5s infinite ease-in-out;
            opacity: 0;
        }

        @keyframes flash {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.9; transform: scale(1.3); }
        }

        @keyframes pulse-border {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; border-color: rgba(224, 176, 255, 0.7); }
        }

        /* تسهيل الوصول: مؤشر التركيز */
        .crystal-ball:focus {
            box-shadow: 0 0 90px rgba(192, 132, 252, 0.95), 0 0 0 4px rgba(192,132,252,0.12);
            transform: translateY(-4px) scale(1.02);
        }
    </style>
</head>
<body>

    <!-- أصوات تجريبية -->
    <audio id="purifyAudio" loop preload="auto" src="https://actions.google.com/sounds/v1/ambiences/ambient_hum_air_conditioner.ogg"></audio>
    <audio id="chargeAudio" loop preload="auto" src="https://actions.google.com/sounds/v1/celestial/subtle_transition.ogg"></audio>

    <div class="sparkles-container" id="sparklesBox" aria-hidden="true">
        <div class="sparkle" style="top: 20%; left: 15%; animation-delay: 0s;"></div>
        <div class="sparkle" style="top: 35%; left: 85%; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="top: 70%; left: 20%; animation-delay: 1s;"></div>
        <div class="sparkle" style="top: 25%; left: 75%; animation-delay: 1.5s;"></div>
        <div class="sparkle" style="top: 55%; left: 80%; animation-delay: 0.2s;"></div>
        <div class="sparkle" style="top: 80%; left: 70%; animation-delay: 0.8s;"></div>
    </div>

    <div class="container">
        <div class="timer-badge" id="timerBadge">⏱️ يتم الآن تبديد الطاقة السلبية: <span id="countdown">03:00</span></div>

        <h2 id="mainTitle">طقس تنظيف الهالة والشفاء</h2>

        <div class="ritual-box" id="ritualBox">
            <p class="instruction" id="stepInstruction">🧘‍♂️ طقس التحرر والتطهير:</p>
            <p class="incantation" id="textBody">
                * خذ 5 أنفاس عميقة (شهيق طويل من الأنف، وزفير بطيء ومريح من الفم لإخراج كل التوتر).<br>
                * ضَع يدك اليمنى فوق البلورة السحرية بالأسفل لتنشيط التطهير الفوري.
            </p>
        </div>

        <div class="crystal-ball-container">
            <div class="crystal-ball" id="crystal" role="button" tabindex="0" aria-label="ابدأ طقس التطهير"></div>
        </div>

        <button class="action-btn" id="exitBtn" onclick="closeApp()">🛡️ تم التثبيت والتحصين</button>
    </div>

    <script>
        // حماية استدعاء Telegram WebApp (قد لا تكون متاحة عند اختبار محلي)
        const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
        try { if (tg && typeof tg.expand === 'function') tg.expand(); } catch (e) { /* fall back silently */ }

        const ONE_RUN_SECONDS = 180; // 3 دقائق
        let isStarted = false;
        let timeLeft = ONE_RUN_SECONDS;
        let countdownInterval = null;

        const crystal = document.getElementById('crystal');
        const purifyAudio = document.getElementById('purifyAudio');
        const chargeAudio = document.getElementById('chargeAudio');
        const timerBadge = document.getElementById('timerBadge');
        const countdownEl = document.getElementById('countdown');
        const sparklesBox = document.getElementById('sparklesBox');
        const exitBtn = document.getElementById('exitBtn');

        function safePlay(audioEl) {
            if (!audioEl) return Promise.resolve();
            // محاولة تشغيل مباشر (يجب أن تُسمح عند وجود تفاعل المستخدم)
            return audioEl.play().catch(() => {
                // محاولة ثانية بعد تعيين muted مؤقتاً (بعض المتصفحات تمنع التشغيل إن لم يُسمح)
                audioEl.muted = true;
                return audioEl.play().then(() => {
                    // إلغاء الكتم بعد التشغيل إن أمكن
                    audioEl.muted = false;
                }).catch(() => {
                    // إذا فشل، تجاهل بهدوء
                });
            });
        }

        function doVibrate(kind) {
            try {
                if (tg && tg.HapticFeedback) {
                    if (kind === 'start' && typeof tg.HapticFeedback.impactOccurred === 'function') tg.HapticFeedback.impactOccurred('medium');
                    if (kind === 'success' && typeof tg.HapticFeedback.notificationOccurred === 'function') tg.HapticFeedback.notificationOccurred('success');
                }
            } catch (e) { /* ignore */ }

            if (navigator.vibrate) {
                if (kind === 'start') navigator.vibrate(200);
                else navigator.vibrate([100, 50, 100]);
            }
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return (m < 10 ? '0' + m : m) + ':' + (sec < 10 ? '0' + sec : sec);
        }

        function startCountdown() {
            // عرض بادج العداد
            timerBadge.classList.add('active');
            countdownEl.innerText = formatTime(timeLeft);

            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) timeLeft = 0;
                countdownEl.innerText = formatTime(timeLeft);

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    transitionToGold();
                }
            }, 1000);
        }

        // بدء الطقس (يُستدعى مرة واحدة عند التفاعل الأول)
        function triggerStart(e) {
            if (isStarted) return;
            isStarted = true;

            // التأكد أن العنصر مرئي كمؤشر تفاعل
            crystal.classList.add('active');

            // تشغيل صوت التطهير (تفاعل المستخدم يسمح بالتشغيل)
            safePlay(purifyAudio).then(() => {
                console.log('purifyAudio playing (or attempted).');
            });

            doVibrate('start');

            // عرض التعليمات الموسعة
            document.getElementById('textBody').innerHTML = `
                <span style="color:#e0b0ff; font-weight:bold; display:block; margin-bottom:8px;">ردد بقلب حاضر ويد ثابتة:</span>
                <span style="font-size:1.05rem; color:#fff; line-height:1.7; display:block; font-style:italic;">
                "بالنور الإلهي المقدس وبنية التحرر والسلام أطرد من هالتي كل حسد، وعين شريرة، وطاقة سلبية تعكر مزاجي وتثقل كاهلي.<br>
                وإنني أعلن الآن قطع جميع الروابط التي تستنزفني وترهقني قطعاً تاماً.<br><br>
                النور الإلهي المقدس يحيط بي الآن من كل جانب واتجاه، أنا محمي الآن بالأنوار الإلهية ومحصن بالمحبة السرمدية." ✨
                </span>
            `;

            // بدء العد التنازلي
            timeLeft = ONE_RUN_SECONDS;
            startCountdown();
        }

        function transitionToGold() {
            // إيقاف صوت التطهير وإعادة تعيينه
            try { purifyAudio.pause(); purifyAudio.currentTime = 0; } catch (e) {}
            // تشغيل صوت الشحن
            safePlay(chargeAudio).then(() => {
                console.log('chargeAudio playing (or attempted).');
            });

            doVibrate('success');

            // تغيير واجهة المستخدم إلى النسخة الذهبية
            document.body.style.background = 'var(--bg-gold)';
            crystal.classList.add('gold');
            sparklesBox.style.display = 'block';

            document.getElementById('mainTitle').textContent = "تم الشفاء أنت محمي الآن";
            document.getElementById('mainTitle').style.color = "#ffe891";
            document.getElementById('mainTitle').style.textShadow = "0 0 20px rgba(212, 175, 55, 0.7)";

            document.getElementById('stepInstruction').textContent = "👁️ طقس التمكين والشحن:";
            document.getElementById('stepInstruction').style.color = "#ffe891";

            document.getElementById('textBody').innerHTML = `
                <span style="font-size:1.1rem; line-height:1.8; display:block; font-weight: 500;">
                "الحب والامتنان للوعي الأسمى.. الحب والامتنان للعالم والأكوان. أنا متصل الآن بمصدر الوفرة اللانهائية، ومستعد لاستقبال البركة، والبهجة، والفرص العظيمة في عاطفتي ومالي. طاقتي مشحونة بالنور، ومساراتي مباركة ومفتوحة." 💛✨
                </span>
            `;

            // إظهار زر الخروج
            exitBtn.style.display = 'block';
        }

        function closeApp() {
            // تنظيف الموارد (إيقاف الأصوات والمؤقت)
            try { if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; } } catch(e){}
            try { purifyAudio.pause(); chargeAudio.pause(); } catch (e) {}
            try {
                if (tg && typeof tg.close === 'function') tg.close();
                else window.close();
            } catch (e) {
                // fallback: إخفاء الواجهة أو إعادة التوجيه
                console.log('closeApp fallback', e);
            }
        }

        // إضافة دعم للتفاعل (pointer + لوحة مفاتيح)
        crystal.addEventListener('pointerdown', function (ev) {
            ev.preventDefault();
            triggerStart(ev);
        }, { passive: false });

        crystal.addEventListener('keydown', function (ev) {
            if (ev.key === 'Enter' || ev.key === ' ') {
                ev.preventDefault();
                triggerStart(ev);
            }
        });

        // زر الخروج: دعم haptic بسيط ثم إغلاق
        exitBtn.addEventListener('click', function() {
            try { if (tg && tg.HapticFeedback && typeof tg.HapticFeedback.impactOccurred === 'function') tg.HapticFeedback.impactOccurred('light'); } catch (e) {}
            closeApp();
        });

        // لو أردت: تعطيل زر الخروج قبل التحول
        exitBtn.style.display = 'none';

        // تحسين تجربة الاختبار خارج Telegram: إن كان المستخدم اختبر في المتصفح العادي، لا يخرب الكود
        window.addEventListener('beforeunload', function () {
            try { purifyAudio.pause(); chargeAudio.pause(); } catch (e) {}
        });
    </script>
</body>
</html>
