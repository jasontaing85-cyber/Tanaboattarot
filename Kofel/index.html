<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التفعيل - TanaboatTarot</title>
    <!-- استدعاء مكتبات تليجرام وAdsgram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
            color: #f1f1f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background: rgba(30, 25, 55, 0.85);
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(111, 66, 193, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 100%;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #a78bfa;
            font-size: 22px;
        }
        p {
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(90deg, #7c3aed 0%, #a78bfa 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.6);
        }
        .btn:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🔮✨</div>
    <h2>تفعيل طاقة البوت اليومية</h2>
    <p>
        أهلاً بك في رحلة التشافي والاتصال الطاقي والروحي. 
        <br><br>
        شاهد الإعلان التالي لفتح قفل البوت بالكامل، والتمتع بكافة قراءات التاروت وجلسات التوجيه الروحي مجاناً **لمدة 24 ساعة كاملة** والاستفادة من طاقة التوجيه والتشافي.
    </p>
    
    <button class="btn" id="watchAdBtn">فتح القفل الآن 🔑</button>
    <div class="status" id="statusText">جاهز لبدء الاتصال الطاقي...</div>
</div>

<script>
    // تهيئة نظام تليجرام
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const userId = user ? user.id : null;

    // تهيئة إعلانات Adsgram
    const AdController = window.Adsgram.init({ blockId: "38328" });

    const watchAdBtn = document.getElementById("watchAdBtn");
    const statusText = document.getElementById("statusText");

    watchAdBtn.addEventListener("click", () => {
        if (!userId) {
            alert("يرجى فتح هذه الصفحة من داخل البوت في تليجرام لاستكمال التفعيل بنجاح!");
            statusText.innerText = "فشل التعرف على معرف تليجرام.";
            return;
        }

        statusText.innerText = "جاري تحضير الإعلان وتفعيل المسار الروحي...";
        watchAdBtn.disabled = true;

        AdController.show({ userId: userId.toString() })
            .then((result) => {
                statusText.style.color = "#34d399";
                statusText.innerText = "تم التفعيل بنجاح! طاقة البوت مفتوحة لك الآن لمدة 24 ساعة ✨";
                watchAdBtn.disabled = false;
                
                // إغلاق تلقائي للعودة للبوت
                setTimeout(() => {
                    tg.close();
                }, 2500);
            })
            .catch((result) => {
                statusText.style.color = "#f87171";
                if (result.error === "user_skip") {
                    statusText.innerText = "تنبيه: يجب إكمال مشاهدة الفيديو لتفعيل القفل.";
                } else {
                    statusText.innerText = "لم تتوفر إعلانات حالياً، حاول مرة أخرى بعد قليل.";
                }
                watchAdBtn.disabled = false;
            });
    });
</script>

</body>
</html>
