<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فتح المحتوى - تليجرام</title>
    <!-- استدعاء مكتبة تليجرام ومكتبة Adsgram الرسمية -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background-color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            margin-bottom: 10px;
            color: #38bdf8;
        }
        p {
            color: #cbd5e1;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #0369a1;
        }
        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>شاهد الإعلان للحصول على نقاطك</h2>
    <p>يرجى الضغط على الزر بالأسفل لمشاهدة فيديو قصير، وبمجرد الانتهاء سيتم إضافة 10 نقاط لحسابك تلقائياً.</p>
    
    <button class="btn" id="watchAdBtn">شاهد الفيديو الآن 📺</button>
    <div class="status" id="statusText">جاهز لبدء العرض</div>
</div>

<script>
    // تهيئة تطبيق تليجرام المصغر
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // فتح التطبيق بكامل الشاشة

    // جلب معرف المستخدم من تليجرام
    const user = tg.initDataUnsafe?.user;
    const userId = user ? user.id : null;

    // تهيئة إعلانات Adsgram باستخدام الـ Block ID الخاص بك
    const AdController = window.Adsgram.init({ blockId: "38328" });

    const watchAdBtn = document.getElementById("watchAdBtn");
    const statusText = document.getElementById("statusText");

    watchAdBtn.addEventListener("click", () => {
        if (!userId) {
            alert("خطأ: لم نتمكن من تحديد هويتك في تليجرام!");
            return;
        }

        statusText.innerText = "جاري تحميل الإعلان...";
        watchAdBtn.disabled = true;

        // تشغيل الإعلان وتمرير معرف المستخدم للتحقق من المكافأة
        AdController.show({ userId: userId.toString() })
            .then((result) => {
                // عند مشاهدة الفيديو بالكامل بنجاح
                statusText.style.color = "#4ade80";
                statusText.innerText = "رائع! تم اكتمال الإعلان بنجاح وتم إضافة النقاط لحسابك.";
                watchAdBtn.disabled = false;
                watchAdBtn.innerText = "شاهد فيديو آخر 📺";
                
                // إغلاق التطبيق المصغر تلقائياً بعد ثانيتين ليعود المستخدم للبوت
                setTimeout(() => {
                    tg.close();
                }, 2000);
            })
            .catch((result) => {
                // في حال حدوث خطأ أو تخطي الإعلان
                statusText.style.color = "#f87171";
                if (result.error === "user_skip") {
                    statusText.innerText = "تنبيه: يجب مشاهدة الفيديو بالكامل للحصول على المكافأة.";
                } else {
                    statusText.innerText = "لم تتوفر إعلانات حالياً، يرجى المحاولة لاحقاً.";
                }
                watchAdBtn.disabled = false;
            });
    });
</script>

</body>
</html>
