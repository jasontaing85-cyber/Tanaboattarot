<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التفعيل - TanaboatTarot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
            color: #f1f1f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background: rgba(30, 25, 55, 0.9);
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(111, 66, 193, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 100%;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #a78bfa;
            font-size: 22px;
        }
        p {
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(90deg, #7c3aed 0%, #a78bfa 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.6);
        }
        .btn:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🔮✨</div>
    <h2>تفعيل طاقة البوت اليومية</h2>
    <p>
        أهلاً بك في رحلة التشافي والاتصال الطاقي والروحي. 
        <br><br>
        شاهد الإعلان التالي لفتح قفل البوت بالكامل، والتمتع بكافة قراءات التاروت وجلسات التوجيه الروحي مجاناً **لمدة 24 ساعة كاملة**.
    </p>
    
    <button class="btn" id="watchAdBtn">فتح القفل الآن 🔑</button>
    <div class="status" id="statusText">جاري التحقق من الاتصال الآمن...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // محاولة جلب المعرف الفعلي أو وضع معرف تجريبي ذكي لعدم تعطيل الإعلان بأي حال
    let userId = tg.initDataUnsafe?.user?.id;
    const statusText = document.getElementById("statusText");
    const watchAdBtn = document.getElementById("watchAdBtn");

    if (!userId) {
        console.log("استخدام معرف احتياطي لتخطي قيود التصفح الخارجي.");
        userId = "999999999"; // معرّف احتياطي لضمان عمل الإعلان حتى لو فُتح من متصفح عادي
        statusText.innerText = "جاهز لبدء الاتصال الطاقي...";
    } else {
        statusText.innerText = "تم الاتصال بالبوت بنجاح ✨";
    }

    // فحص مكتبة Adsgram
    if (typeof window.Adsgram === 'undefined') {
        statusText.style.color = "#f87171";
        statusText.innerText = "تنبيه: يرجى إيقاف مانع الإعلانات (Adblock) لفتح القفل.";
    }

    watchAdBtn.addEventListener("click", () => {
        if (typeof window.Adsgram === 'undefined') {
            alert("مكتبة الإعلانات لم تتحمل بعد، يرجى إعادة تحميل الصفحة.");
            return;
        }

        statusText.style.color = "#a78bfa";
        statusText.innerText = "جاري تحميل الإعلان...";
        watchAdBtn.disabled = true;

        // تهيئة الإعلان بالـ UnitID الخاص بك 38328
        const AdController = window.Adsgram.init({ blockId: "38328" });

        AdController.show({ userId: userId.toString() })
            .then((result) => {
                statusText.style.color = "#34d399";
                statusText.innerText = "تمت المشاهدة بنجاح! جاري التفعيل...";

                // إرسال طلب التفعيل لسيرفر جوجل بشكل آمن وبخلفية المتصفح دون حظر CORS
                const serverUrl = `https://script.google.com/macros/s/AKfycbyucecMEcXIRv3nC1m7Ulr1cFg-cFdMD7VSmomv1KO-0MK7fy06kWjlAA_tfFI1vxgUSg/exec?user_id=${userId}`;
                
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(serverUrl);
                } else {
                    fetch(serverUrl, { mode: 'no-cors' });
                }

                setTimeout(() => {
                    tg.close();
                }, 2000);
            })
            .catch((result) => {
                statusText.style.color = "#f87171";
                watchAdBtn.disabled = false;
                
                if (result.error === "user_skip") {
                    statusText.innerText = "تنبيه: يجب إكمال الإعلان بالكامل للحصول على التفعيل.";
                } else if (result.error === "no_ads") {
                    statusText.innerText = "عذراً، لا تتوفر إعلانات حالياً في منطقتك. جرب لاحقاً.";
                } else {
                    statusText.innerText = "خطأ في الاتصال بالشبكة الإعلانية.";
                }
            });
    });
</script>

</body>
</html>
