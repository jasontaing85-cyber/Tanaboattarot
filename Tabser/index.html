<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بصير - قارئ الفنجان الذكي</title>
    <!-- تضمين مكتبة تطبيقات تليجرام المصغرة الرسمية -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-mystic: #120c06;
            --surface-mystic: #1e140b;
            --accent-gold: #dfb15b;
            --accent-gold-hover: #f5cc7f;
            --text-light: #f7f4ef;
            --text-muted: #a89a87;
            --border-mystic: #3a2a18;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-mystic);
            color: var(--text-light);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--surface-mystic);
            border: 1px solid var(--border-mystic);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 42px;
            margin-bottom: 8px;
            display: inline-block;
            filter: drop-shadow(0 4px 8px rgba(223, 177, 91, 0.3));
        }

        h1 {
            color: var(--accent-gold);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .setup-section {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-mystic);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--accent-gold);
            margin-bottom: 6px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #090603;
            border: 1px solid var(--border-mystic);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            text-align: left;
            direction: ltr;
        }

        input[type="text"]::placeholder {
            text-align: right;
            color: #4e3f2e;
        }

        .upload-card {
            border: 2px dashed var(--accent-gold);
            background: rgba(223, 177, 91, 0.02);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-card input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--accent-gold);
        }

        .preview-box {
            display: none;
            width: 100%;
            margin-top: 10px;
            text-align: center;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 12px;
            border: 2px solid var(--border-mystic);
            object-fit: contain;
        }

        .action-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent-gold), #b88d3c);
            color: #120c06;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(223, 177, 91, 0.2);
            transition: all 0.3s;
        }

        .action-btn:disabled {
            background: #2b2116;
            color: #5a4a37;
            box-shadow: none;
        }

        .pulse-loader {
            display: none;
            text-align: center;
            margin: 25px 0;
            color: var(--accent-gold);
            font-size: 14px;
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .result-wrapper {
            display: none;
            margin-top: 24px;
            border-top: 1px dashed var(--border-mystic);
            padding-top: 20px;
        }

        .result-header {
            color: var(--accent-gold);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .result-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-mystic);
            border-radius: 12px;
            padding: 16px;
            line-height: 1.8;
            font-size: 14.5px;
            white-space: pre-line;
            color: #f0e9df;
            text-align: justify;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <span class="logo">☕</span>
        <h1>بصير الذكي</h1>
        <p class="subtitle">التطبيق المصغر الرسمي لقراءة فنجان القهوة وتحليل الرموز والإشارات بحكمة بالغة وموسوعية</p>
    </header>

    <div class="setup-section">
        <label for="apiKey">رمز الاتصال الروحي (Gemini API Key):</label>
        <input type="text" id="apiKey" placeholder="أدخل مفتاح الـ API الخاص بك هنا..." autocomplete="off">
    </div>

    <div class="upload-card">
        <div class="upload-icon">📸</div>
        <p style="font-size: 14px; font-weight: 600; color: var(--accent-gold);">ارفع أو التقط صورة لداخل الفنجان</p>
        <input type="file" id="cupFile" accept="image/*">
    </div>

    <div class="preview-box" id="previewBox">
        <img id="cupPreview" src="" alt="معاينة الفنجان">
    </div>

    <button class="action-btn" id="readBtn" disabled>اسكب أسرار الفنجان واستقرئ الخطوط</button>

    <div class="pulse-loader" id="loader">🔮 يتأمل البصير الحكيم الآن تفاصيل الفنجان، ويفك شفرات الرموز والخطوط بعمق وموسوعية... يرجى الانتظار...</div>

    <div class="result-wrapper" id="resultWrapper">
        <div class="result-header">✨ قراءة البصير الحكيم المستفيضة:</div>
        <div class="result-box" id="resultContent"></div>
    </div>
</div>

<script>
    // تفعيل إعدادات تليجرام للتطبيقات المصغرة
    if (window.Telegram && window.Telegram.WebApp) {
        const webapp = window.Telegram.WebApp;
        webapp.ready();
        webapp.expand(); // تمديد التطبيق ليأخذ كامل مساحة الشاشة عمودياً في تليجرام
    }

    const cupFile = document.getElementById('cupFile');
    const cupPreview = document.getElementById('cupPreview');
    const previewBox = document.getElementById('previewBox');
    const readBtn = document.getElementById('readBtn');
    const apiKeyInput = document.getElementById('apiKey');
    const loader = document.getElementById('loader');
    const resultWrapper = document.getElementById('resultWrapper');
    const resultContent = document.getElementById('resultContent');

    let base64Data = "";
    let fileMime = "";

    cupFile.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            fileMime = file.type;
            const reader = new FileReader();
            reader.onload = function(event) {
                cupPreview.src = event.target.result;
                previewBox.style.display = 'block';
                base64Data = event.target.result.split(',')[1];
                validateForm();
            };
            reader.readAsDataURL(file);
        }
    });

    apiKeyInput.addEventListener('input', validateForm);

    function validateForm() {
        if (base64Data && apiKeyInput.value.trim().length > 10) {
            readBtn.disabled = false;
        } else {
            readBtn.disabled = true;
        }
    }

    readBtn.addEventListener('click', async function() {
        const key = apiKeyInput.value.trim();
        if (!key || !base64Data) return;

        readBtn.disabled = true;
        loader.style.display = 'block';
        resultWrapper.style.display = 'none';
        resultContent.textContent = '';

        // أمر هندسة الذكاء الاصطناعي شديد العمق للتحليل والحماية من الاحتيال والإسهاب
        const systemPrompt = `أنت الآن "البصير الحكيم الحاذق"، أكبر خبير متمرس ومتمكن تاريخياً في علم وقواعد استقراء وتبصير فنجان القهوة وتفكيك دلالات خطوطه النفسية، الروحية، والواقعية.

مهمتك الصارمة والدقيقة هي تحليل الصورة المرفقة للفنجان بدقة متناهية وفق الخطوات التالية:

1. **كشف الاحتيال والمصداقية (Strict Integrity Check):**
   - قم بفحص تفاصيل الصورة أولاً. إذا اكتشفت أن الصورة فارغة، بيضاء تماماً، ليست لفنجان قهوة من الداخل (مثل صور سيلفي، مناظر طبيعية، حيوانات، أو فنجان نظيف تماماً لم تترسب فيه بقايا القهوة الدافئة)، يجب عليك فوراً التوقف والاعتذار بحزم، وقول ما تراه بدقة دون تزييف أو اختلاق (مثال: "أيها السائل، أرى مساحة بيضاء خالية من أثر الأسرار، أحضر لي فنجاناً حقيقياً لأرى مساراتك").

2. **طبيعة ومستوى التحليل (الموسوعية والشرح المطول جداً):**
   - يطلب منك المستخدم شرحاً بسيطاً، واضحاً، وموسعاً كبيراً جداً (إسهاب شديد وتفصيل دقيق). لا تختصر أبداً. فكك كل تفصيلة صغيرة وتوسع في الشرح بعبارات بلاغية دافئة وممتعة.
   - امزج في قراءتك بين الفراسة وقواعد التبصير الكلاسيكية (الرموز والحروف) وبين الحكمة الإرشادية والتأمل النفسي الذي يساعد السائل على الفهم والنمو الذاتي ومواجهة عقباته بتفاؤل وقوة.

3. **هيكلية القراءة المطلوبة بالتفصيل الممل:**
   - **المقدمة الروحانية:** صف فيها طاقة الفنجان العامة، كثافة البقايا، الأجواء الفلكية أو النفسية التي تشعر بها من الخطوط الأولى.
   - **جدار الفنجان العلوي والأوسط (مرآة الماضي والمسار الحالي):** ابحث بدقة عن الخطوط العمودية، التجمعات الكثيفة، والرموز الواضحة (مثل الأشكال الحيوانية كالعصفور أو الغراب أو الثعبان، أو الرموز كالمفتاح، القلب، الحلقات، الأرقام والحروف). اشرح كل رمز على حدة بإسهاب شديد وبأكثر من ثلاثة أسطر لكل إشارة.
   - **قاع الفنجان وبؤرة المشاعر (المستقبل والمخاوف المترسبة):** قاع الفنجان يجمع ترسبات النوايا والمستقبل القريب والبعيد، حلل السواد أو الانفراجات البيضاء فيه ومستويات القلق أو الاستقرار.
   - **طرق وممرات الفنجان (الانفراجات والفرص والعقبات):** هل الممرات سالكة نحو الأعلى أم مسدودة؟ وما تعنيه هذه الممرات في مسار السائل العملي والمالي والشخصي.
   - **الوصية والحكمة الكبرى:** قدم نصيحة تأملية واضحة وعميقة جداً تنير بصيرته وتدفعه للأمل والعمل الإيجابي والنمو الشخصي وتجاوز القلق الحياتي.`;

        const payload = {
            contents: [{
                parts: [
                    { text: systemPrompt },
                    { inlineData: { mimeType: fileMime, data: base64Data } }
                ]
            }]
        };

        try {
            // استخدام نموذج gemini-1.5-flash فائق السرعة والمثالي لمعالجة الرؤية والنصوص الممتدة فورياً
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                resultContent.textContent = data.candidates[0].content.parts[0].text;
                resultWrapper.style.display = 'block';
                
                // نزول تلقائي سلس لمشاهدة النتيجة على الهواتف
                setTimeout(() => {
                    resultWrapper.scrollIntoView({ behavior: 'smooth' });
                }, 200);
            } else {
                resultContent.textContent = 'عذراً، لم يتمكن البصير من استقراء الرموز بشكل صحيح. يرجى التأكد من جودة الصورة المرفوعة وصلاحية مفتاح الـ API.';
                resultWrapper.style.display = 'block';
            }
        } catch (error) {
            console.error(error);
            resultContent.textContent = 'حدث خطأ غير متوقع أثناء الاتصال بعوالم البيانات. يرجى التحقق من اتصال الإنترنت ومن دقة مفتاح الـ API الخاص بك.';
            resultWrapper.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            readBtn.disabled = false;
        }
    });
</script>
</body>
</html>
