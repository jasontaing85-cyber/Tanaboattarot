<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>معبد هرمس العاطفي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-stone: #0d0a07;
      --temple-wall: #1a1410;
      --copper: #b87333;
      --gold-dark: #8c6d23;
      --text-amber: #e5c185;
      --text-muted: #a49382;
    }
    
    * { box-sizing: border-box; }
    
    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--bg-stone);
      background-image: radial-gradient(circle at center, #1f1610 0%, #0d0a07 100%);
      color: var(--text-amber);
      margin: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .temple-container {
      width: 100%;
      max-width: 600px;
      background: var(--temple-wall);
      border: 2px solid var(--gold-dark);
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(140, 109, 35, 0.15);
      padding: 24px;
      text-align: center;
      position: relative;
    }

    .temple-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0;
      color: var(--text-amber);
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      letter-spacing: 1px;
    }

    .temple-header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 8px 0 24px 0;
    }

    /* الحجر الهرمي التفاعلي */
    .pyramid-trigger-zone {
      margin: 40px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 400px;
    }

    .pyramid-stone {
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 86.6px solid var(--copper);
      position: relative;
      cursor: pointer;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7));
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .pyramid-stone::after {
      content: '';
      position: absolute;
      top: 0;
      left: -50px;
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 0px solid transparent;
      border-bottom: 86.6px solid rgba(255,255,255,0.1);
      transform-origin: top right;
    }

    .pyramid-stone:hover {
      transform: scale(1.05) rotateY(10deg);
      filter: drop-shadow(0 15px 25px rgba(184, 115, 51, 0.4));
    }

    .pyramid-stone:active {
      transform: scale(0.95);
    }

    .pyramid-label {
      font-size: 0.85rem;
      color: var(--copper);
      margin-top: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* نافذة الكشف الرخامية */
    .sanctuary-reading {
      display: none;
      background: #130e0a;
      border: 1px solid var(--gold-dark);
      padding: 20px;
      margin-top: 24px;
      text-align: right;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
      animation: stoneReveal 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes stoneReveal {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sanctuary-reading h2 {
      color: var(--text-amber);
      font-size: 1.3rem;
      margin-top: 0;
      border-bottom: 1px dashed var(--gold-dark);
      padding-bottom: 8px;
      text-align: center;
    }

    .meta-info {
      font-size: 0.85rem;
      color: var(--copper);
      margin-bottom: 16px;
      text-align: center;
      font-weight: 600;
    }

    .stone-quote {
      font-style: italic;
      background: rgba(184, 115, 51, 0.07);
      border-right: 3px solid var(--copper);
      padding: 12px;
      margin: 16px 0;
      color: #fff;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .section-title {
      font-weight: 700;
      color: var(--text-amber);
      margin-top: 14px;
      font-size: 1rem;
    }

    .section-content {
      color: var(--text-muted);
      font-size: 0.92rem;
      margin: 4px 0 14px 0;
      line-height: 1.6;
      text-align: justify;
    }

    .cooldown-msg {
      color: #c94c4c;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 15px;
      display: none;
    }
  </style>
  <!-- سكربت مكتبة تيليجرام الرسمية -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- سكربت مكتبة Adsgram الإعلانية الرسمية -->
  <script src="https://sad.adsgram.ai/js/telegram-web-app.js"></script>
</head>
<body>

  <div class="temple-container">
    <div class="temple-header">
      <h1>تاروت هرمس العاطفي</h1>
      <p>المعبد الروحي القديم — انقر على الحجر الهرمي لاستدعاء رسالتك اليومية</p>
    </div>

    <div class="pyramid-trigger-zone" id="triggerZone">
      <div>
        <div class="pyramid-stone" id="pyramidBtn" role="button" aria-label="سحب بطاقة"></div>
        <div class="pyramid-label">المذبح الهرمي</div>
      </div>
    </div>

    <div id="cooldownBlock" class="cooldown-msg">لقد زرت المعبد اليوم. يمكنك استشارة الحجر مرة واحدة كل 24 ساعة لحماية طاقة النية.</div>

    <div id="sanctuaryReading" class="sanctuary-reading">
      <h2 id="cardLabel">اسم الورقة</h2>
      <div class="meta-info">المرجع الهرمسي: <span id="cardRef"></span></div>
      
      <div class="stone-quote" id="cardQuote">الرسالة الروحية لليوم</div>
      
      <div class="section-title">🔮 الشرح الموسع والمفصل للورقة:</div>
      <div class="section-content" id="cardMeaning"></div>
      
      <div class="section-title">⚠️ تفاصيل هامة للانتباه:</div>
      <div class="section-content" id="cardChallenge"></div>
    </div>
  </div>

        ref: "بطاقة البرج (The Tower)",
        quote: "«أتقبل التغيير والتحول بمرونة وشجاعة، وأثق تماماً أن ما يرحل يفسح المجال للأجمل والأصدق.»",
        meaning: "قد تبدو هذه الورقة مخيفة للوهلة الأولى، لكن جوهرها الروحي نبيل وتطهيري جداً. هي ترمز إلى حدوث هزات مفاجئة، صدمات غير متوقعة، أو كشف حقائق وأسرار في حياتك العاطفية تأتي لتهدم الأوهام والأبنية النفسية الهشة التي تظاهرت لفترة طويلة بأنها متينة وقوية. العاصفة لا تأتي لتدميرك، بل لتزيل من طريقك بقوة العلاقات الزائفة أو الأنماط السلوكية البالية التي لم تعد تخدم تطورك الروحي ونضجك الشخصي.",
        challenge: "لا تحاول مطلقاً التشبث بالجدران الآيلة للسقوط أو مقاومة التغيير الجذري الجاري; فالمقاومة تزيد الألم والمعاناة بلا طائل. تذكر جيداً أن الهدم هنا يحدث فقط ليفسح المجال كاملاً لبناء أساسات جديدة، حقيقية، وأكثر صلابة على أرض صلبة ونقية من الصدق المطلق."
      },
      {
        label: "الارتقاء النجمي — حب سامي",
        ref: "بطاقة النجم (The Star)",
        quote: "«أنا منارة تشع بالحب والنقاء، ونوري الداخلي يجذب إليّ كل ما يناسب طهارة روحي.»",
        meaning: "هذه الورقة هي ومضة الأمل الساطعة، الشفاء التام، والارتقاء الروحي الخالص بعد الأوقات العصيبة والأيام المظلمة. تخبرك أن قلبك يمر حالياً بمرحلة تجدد، غسيل طاقي، وصفاء نقي، وهناك طاقة إلهام تتدفق إليك مباشرة من الكون لتنير عتمة الأيام الماضية. إذا كنت تبحث عن حب، فهذه إشارة واضحة بأنك تجذب طاقة تناسب وعيك المرتفع ونقائك الداخلي الحالي، حب يقوم على التقدير السامي، الاحترام والرحمة.",
        challenge: "لا تستعجل قطف الثمار العاطفية أو دفع الأمور بقوة وإلحاح؛ دع طاقة النجم الشافية تنساب بهدوء وسلاسة طبيعية في حياتك. حافظ على أفكارك إيجابية وتفاؤلك عالياً جداً، فالكون مستعد ويستجيب الآن لترددات الأمل والصفاء النابعة من عمق قلبك."
      }
    ];

    const STORAGE_KEY = 'hermetic_tarot_cooldown';

    function canDraw() {
      const lastDraw = localStorage.getItem(STORAGE_KEY);
      if (!lastDraw) return true;
      const hoursPassed = (Date.now() - Number(lastDraw)) / (1000 * 60 * 60);
      return hoursPassed >= 24;
    }

    document.getElementById('pyramidBtn').addEventListener('click', () => {
      // 1. التحقق أولاً من صلاحية الـ 24 ساعة لضمان النية وحماية الطاقة
      if (!canDraw()) {
        document.getElementById('cooldownBlock').style.display = 'block';
        return;
      }

      // 2. تشغيل فيديو إعلان Adsgram المكافئ قبل الكشف
      AdController.show().then((result) => {
        // إذا اكتملت المشاهدة بنجاح، يتم السحب تلقائياً
        executeTarotDraw();
      }).catch((result) => {
        // التعامل مع وضع التجربة أو أخطاء الشبكة المؤقتة حتى لا يتعطل البوت على المستخدم
        if (result.error) {
          console.log("Ad Block Info:", result.description);
          executeTarotDraw(); // التجاوز الفوري في وضع الفحص
        } else {
          // إذا أغلق المستخدم الفيديو متعمداً قبل انتهائه
          alert("للحصول على الرسالة الروحية الكاملة من المعبد اليوم، يرجى مشاهدة الفيديو حتى النهاية.");
        }
      });
    });

    // دالة تنفيذ عملية السحب وعرض البيانات وعمل الـ Cooldown
    function executeTarotDraw() {
      // اختيار عشوائي للورقة
      const randomIndex = Math.floor(Math.random() * tarotData.length);
      const card = tarotData[randomIndex];

      // عرض البيانات في صندوق المعبد الرخامي
      document.getElementById('cardLabel').innerText = card.label;
      document.getElementById('cardRef').innerText = card.ref;
      document.getElementById('cardQuote').innerText = card.quote;
      document.getElementById('cardMeaning').innerText = card.meaning;
      document.getElementById('cardChallenge').innerText = card.challenge;

      // إظهار النتيجة وإخفاء زر السحب لحماية العمق اليومي
      document.getElementById('sanctuaryReading').style.display = 'block';
      document.getElementById('cooldownBlock').style.display = 'none';
      
      // حفظ وقت السحب الحالي في ذاكرة المتصفح المحلية لمنع التكرار
      localStorage.setItem(STORAGE_KEY, Date.now());
    }

    // عند تحميل الصفحة، تحقق من حالة السحب السابقة
    window.addEventListener('load', () => {
      if (!canDraw()) {
        document.getElementById('cooldownBlock').style.display = 'block';
      }
    });
  </script>
</body>
</html>
