<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تاروت هرمس المتطور</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#05030f; --card-bg:#160f25; --accent:#d4af37; --text:#e0e0e0; --glass: rgba(255,255,255,0.05);
    }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
    .wrap { max-width: 800px; margin: auto; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 30px; }
    .tarot-card { 
      aspect-ratio: 2/3; background: var(--card-bg); border: 1px solid rgba(212,175,55,0.2);
      border-radius: 15px; cursor: pointer; transition: transform 0.4s, box-shadow 0.4s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px; text-align: center; color: var(--accent); position: relative; overflow: hidden;
    }
    .tarot-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(212,175,55,0.2); }
    .reading-box { 
      display: none; background: rgba(255,255,255,0.03); border: 1px solid var(--accent);
      padding: 30px; border-radius: 20px; margin-top: 30px; animation: fadeIn 0.8s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    h2 { color: var(--accent); margin-top: 0; }
    .spiritual-quote { font-style: italic; color: #fff; background: rgba(212,175,55,0.1); padding: 15px; border-right: 4px solid var(--accent); margin: 20px 0; }
    button { background: var(--accent); border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div class="wrap">
    <header style="text-align:center">
      <h1>تاروت هرمس — رسائل القلب</h1>
      <p>اسحب بطاقة واحدة لتعرف مسار طاقتك اليوم</p>
    </header>

    <div class="card-grid" id="cardGrid"></div>

    <div id="reading" class="reading-box">
      <h2 id="cardTitle"></h2>
      <p><strong>المرجع الروحي:</strong> <span id="cardRef"></span></p>
      <div class="spiritual-quote" id="spiritualQuote"></div>
      <h3>جوهر الرسالة</h3>
      <p id="cardMeaning"></p>
      <button onclick="window.location.reload()">سحب جديد</button>
    </div>
  </div>

  <script>
    const tarotData = [
      {
        id: 1, label: "المرآة المضيئة", ref: "العشاق (The Lovers)",
        meaning: "هذه البطاقة تدعوك لترى انعكاس روحك في الآخرين. في علاقتك، الأمر لا يتعلق فقط بالحب، بل بالاعتراف بأن شريكك هو مرآة لجوانب خفية في نفسك. حين تتقبل نفسك بصدق، يزدهر الحب. لا تبحث عن الكمال، بل ابحث عن الصدق الذي يجمعكما.",
        quote: "أنا أحب بصدق، لأنني أرى في شريك حياتي أجزاءً من نور روحي."
      },
      {
        id: 2, label: "دوامة الشوق", ref: "القمر (The Moon)",
        meaning: "تحدث هذه البطاقة حين تكون المشاعر غامضة أو غير واضحة. قد تشعر بالخوف أو عدم الأمان. هي دعوة لمواجهة المخاوف العاطفية بدلاً من الهروب منها. ثق بحدسك، فالأحلام والحدس هما دليلك الآن وليس المنطق الجاف.",
        quote: "أتحرر من أوهام الخوف، وأثق في نور بصيرتي."
      },
      {
        id: 3, label: "سفينة الأمان", ref: "العالم (The World)",
        meaning: "وصول إلى حالة من الاكتمال والرضا. البطاقة تشير إلى علاقة متزنة ومستقرة، أو نهاية دورة عاطفية وبداية مرحلة جديدة أكثر نضجاً. أنت في المكان الصحيح عاطفيًا، استمتع بالرحلة.",
        quote: "أنا متصل، مكتمل، وممتن لكل خطوة في رحلة حبي."
      },
      {
        id: 4, label: "اللهيب المشتعل", ref: "فارس العصي (Knight of Wands)",
        meaning: "شغف متدفق وطاقة عالية. هذه البطاقة تحذر من التسرع. الحب هنا ملتهب ومثير، لكنه يحتاج للتروي لكي لا يحرق نفسه. استخدم طاقتك للإبداع مع شريكك وليس للصراعات.",
        quote: "أوجه شغفي نحو البناء، وأمنح حبي دفئاً لا حريقاً."
      },
      {
        id: 5, label: "همس القلب", ref: "اثنان من الكؤوس (Two of Cups)",
        meaning: "أسمى أشكال التواصل العاطفي. هي بطاقة التوأم أو الشراكة المتناغمة. تعبر عن التفاهم التام، العطاء المتبادل، والقدرة على فهم الآخر دون كلام. هي وعد بسلام عاطفي.",
        quote: "قلبي وقلب شريكي يغنيان في تناغم كوني واحد."
      },
      {
        id: 6, label: "الاحتواء الشافي", ref: "الاعتدال (Temperance)",
        meaning: "البطاقة تدعو للتوازن والشفاء. إذا كنت تعاني من جروح سابقة، فهذا هو الوقت للتئامها. لا تكن متطرفًا في مشاعرك؛ ابحث عن الحل الوسط (الاعتدال) في كل ردود أفعالك.",
        quote: "أوازن بين عقلي وقلبي، وأمنح نفسي فرصة للشفاء."
      },
      {
        id: 7, label: "الانعكاس الصامت", ref: "الناسك (The Hermit)",
        meaning: "دعوة للانسحاب المؤقت والبحث عن الإجابات في الداخل. الصمت ليس دائمًا يعني البعد، بل يعني النضج. أحيانا نحتاج للابتعاد لنفهم ما نحتاجه حقاً من علاقتنا.",
        quote: "في صمتي أجد إجاباتي، وفي عزلتي أجد قوتي."
      },
      {
        id: 8, label: "بوابة الفرص", ref: "الساحر (The Magician)",
        meaning: "أنت تمتلك كل الأدوات لتحويل علاقتك إلى ما تريد. البطاقة تعني أن الإرادة القوية والقرار الواضح هما كل ما تحتاجه الآن لتغيير الواقع العاطفي. لا تنتظر، ابدأ الخطوة الأولى.",
        quote: "أنا خالق واقعي، وأملك القوة لتحويل حبي إلى تجربة استثنائية."
      },
      {
        id: 9, label: "نبع الحنان", ref: "الإمبراطورة (The Empress)",
        meaning: "الوفرة، الرعاية، والخصوبة العاطفية. هذه البطاقة تدل على الحب الذي يغذي الروح. هي طاقة أمومية محبة تهتم بالتفاصيل الصغيرة. قد تشير إلى نمو جديد في العلاقة أو التزام أعمق.",
        quote: "أمنح الحب بسخاء، وأستقبل الرعاية بكل امتنان."
      },
      {
        id: 10, label: "النقاء والانسجام", ref: "عشرة من الكؤوس (Ten of Cups)",
        meaning: "السعادة العائلية والروحية. هذه هي بطاقة 'النهاية السعيدة' أو الشعور بالانتماء المطلق. هي تتويج لجهودك العاطفية بسلام داخلي وهدوء.",
        quote: "أعيش في سلام مع قلبي ومع من أحب."
      },
      {
        id: 11, label: "عاصفة التحول", ref: "البرج (The Tower)",
        meaning: "هدم القديم لبناء الجديد. التغيير قد يكون مفاجئاً ومؤلماً، لكنه ضروري. هذه البطاقة ليست سيئة، هي فقط تعني أن التغيير قادم لتنظيف حياتك العاطفية مما لم يعد يخدم نموك.",
        quote: "أتقبل التغيير بمرونة، وأثق أن ما يرحل يفسح المجال للأفضل."
      },
      {
        id: 12, label: "الارتقاء النجمي", ref: "النجم (The Star)",
        meaning: "الأمل، الإلهام، والتجدد بعد فترة صعبة. البطاقة تعدك بأنك في مرحلة شفاء روحي عميق. هناك ضوء في نهاية النفق، وعلاقتك تتجه نحو مستوى أرقى من الوعي.",
        quote: "أنا منارة للحب، ونوري يجذب ما يناسب روحي."
      }
    ];

    const grid = document.getElementById('cardGrid');
    tarotData.forEach(card => {
      const el = document.createElement('div');
      el.className = 'tarot-card';
      el.innerHTML = `<h3>${card.label}</h3><p>اسحبني</p>`;
      el.onclick = () => showReading(card);
      grid.appendChild(el);
    });

    function showReading(card) {
      document.getElementById('cardGrid').style.display = 'none';
      const box = document.getElementById('reading');
      box.style.display = 'block';
      document.getElementById('cardTitle').innerText = card.label;
      document.getElementById('cardRef').innerText = card.ref;
      document.getElementById('spiritualQuote').innerText = card.quote;
      document.getElementById('cardMeaning').innerText = card.meaning;
    }
  </script>
</body>
</html>
