<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>عجلة الأقدار - الإرشاد الطاقي</title>
    
    <!-- سكريبت تليجرام لضمان التوافق التام والاستقرار داخل التطبيق المصغر -->
    <script src="https://telegram.org/js/telegram-webapp.js"></script>

    <!-- استدعاء خطوط مميزة وفخمة من جوجل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Cairo:wght@400;700&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07050f;
            --purple-deep: #160e2e;
            --gold-premium: #d4af37;
            --gold-light: #fff3cc;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --purple-glow: rgba(139, 92, 246, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1b103c 0%, #07050f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* خلفية النجوم المتلألئة الساحرة */
        .cosmic-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 150px 150px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            z-index: 2;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 28px;
            font-style: italic;
            color: var(--gold-premium);
            text-shadow: 0 0 15px var(--gold-glow);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        header p {
            font-size: 13px;
            color: #b8b1db;
            font-weight: 500;
        }

        /* حاوية العجلة والمؤشر الفخم */
        .wheel-wrapper {
            position: relative;
            width: 330px;
            height: 330px;
            margin-bottom: 25px;
            z-index: 2;
        }

        /* مؤشر ذهبي فخم ممتد لمركز الدوران */
        .pointer-gold {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 28px solid var(--gold-premium);
            z-index: 10;
            filter: drop-shadow(0 0 8px var(--gold-premium));
        }

        /* حلقة العجلة وتصميم الـ Canvas */
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 40px var(--purple-glow), 0 0 0 6px #1c133a, 0 0 0 10px var(--gold-premium);
            transition: transform 5s cubic-bezier(0.1, 0.75, 0.1, 1);
        }

        /* زر المنتصف الفخم المرصع بالذهبي */
        .center-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #fff3cc 0%, #d4af37 60%, #aa8417 100%);
            border-radius: 50%;
            z-index: 11;
            box-shadow: 0 0 20px var(--gold-premium), inset 0 0 8px rgba(0,0,0,0.4);
            cursor: pointer;
            border: 3px solid #07050f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            color: #07050f;
            user-select: none;
        }

        /* كرت عرض النتائج والحلول الطاقية */
        .oracle-card {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(135deg, rgba(22, 14, 46, 0.9) 0%, rgba(7, 5, 15, 0.95) 100%);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 15px rgba(139, 92, 246, 0.1);
            display: none;
            z-index: 2;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .oracle-verdict {
            font-size: 21px;
            color: var(--gold-premium);
            margin-bottom: 16px;
            font-weight: 800;
            text-shadow: 0 0 10px var(--gold-glow);
            letter-spacing: 0.5px;
        }

        .solution-container {
            background: rgba(255, 255, 255, 0.03);
            border-right: 4px solid var(--gold-premium);
            padding: 14px;
            border-radius: 4px 14px 14px 4px;
            text-align: right;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }

        .solution-container label {
            display: block;
            font-weight: bold;
            color: #a78bfa;
            margin-bottom: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .solution-text {
            font-size: 14px;
            line-height: 1.6;
            color: #e4e0f2;
            font-weight: 500;
        }

        /* الأزرار التفاعلية الفخمة */
        .premium-btn {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(90deg, #aa8417 0%, #d4af37 50%, #aa8417 100%);
            background-size: 200% auto;
            border: none;
            color: #07050f;
            padding: 15px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 14px;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.25);
            z-index: 2;
            display: block;
            transition: all 0.4s ease;
        }

        .premium-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .premium-btn.disabled {
            background: linear-gradient(90deg, #373244 0%, #4c465c 100%);
            color: #89839c;
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="cosmic-bg"></div>

    <header>
        <h1>🔮 عجلة الأقدار والإرشاد الطاقي</h1>
        <p>ركّز في سؤالك ومسار نيتك بيقين، ثم أدر العجلة لاستقبال التوجيه</p>
    </header>

    <div class="wheel-wrapper">
        <div class="pointer-gold"></div>
        <canvas id="wheelCanvas" width="450" height="450"></canvas>
        <div class="center-core" id="spinCore">دوران</div>
    </div>

    <!-- كرت عرض الرسائل الإرشادية والحلول -->
    <div class="oracle-card" id="oracleCard">
        <div class="oracle-verdict" id="verdictText">رسالة القدر...</div>
        <div class="solution-container">
            <label>✨ العلاج والتوكيد الطاقي المتاح لنيتك:</label>
            <div class="solution-text" id="solutionText">يتم استحضار الإرشاد...</div>
        </div>
    </div>

    <button class="premium-btn" id="actionBtn">أدر عجلة الأقدار الآن</button>

    <script>
        // إخطار تليجرام بأن التطبيق أصبح جاهزاً للعمل بالكامل لقراءة الأبعاد المناسبة للموبايل
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // تمديد الشاشة الكاملة داخل تليجرام
        }

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinCore = document.getElementById('spinCore');
        const actionBtn = document.getElementById('actionBtn');
        const oracleCard = document.getElementById('oracleCard');
        const verdictText = document.getElementById('verdictText');
        const solutionText = document.getElementById('solutionText');

        const dataset = [
            { option: "الأمر غامض الآن", solution: "أشعل شمعة بيضاء طبيعية، وتأمل لهيبها لمدة 3 دقائق لتهدئة ذهنك وجلب الوضوح لنيتك." },
            { option: "الوقت غير مناسب", solution: "خذ تنفساً عميقاً وردد: 'أنا متناغم مع توقيت الكون المثالي، وكل ما هو لي سيتجلى في وقته الصحيح'، ثم أعد المحاولة لاحقاً." },
            { option: "لا تفعل ذلك الآن", solution: "امشِ حافي القدمين على عشب أخضر أو تراب طبيعي لمدة 5 دقائق (عملية التأريض) لتفريغ طاقة الحماس الزائد وإعادة التوازن لنظامك الطاقي." },
            { option: "الحظ لا يدعمك حالياً", solution: "تبرع ببعض الطعام أو الشراب (عدا اللحوم والأسماك) لأحد المحتاجين أو الحيوانات؛ فالعطاء الفوري ينظف الهالة ويدفع الحجب." },
            { option: "طاقتك مشتتة", solution: "اشرب كوباً من الماء النقي ببطء وعلى 3 دفعات، مع استحضار نية واضحة لمسح وتطهير أي مخاوف أو أفكار سلبية تعيق رغبتك." },
            { option: "هناك معوقات في مسارك", solution: "ارتدِ قلادة تحتوي على حجر الكوارتز الشفاف أو الفيروز، أو احمل قطعة نحاس صغيرة لتنقية هالتك وحماية طاقة نيتك من الخوف." },
            { option: "تحتاج إلى استخارة باطنية", solution: "اذهب إلى مكان منعزل، أغمض عينيك، تنفس بعمق واسأل قلبك الصغير فهو مرشدك الموثوق والملهم الذي لا يخطئ." },
            { option: "الأمر يتطلب طاقة صبر", solution: "اكتب رغبتك على ورقة بيضاء بصيغة الماضي (كأنها تحققت)، وابدأها بعبارة 'شكراً لله والكون'، ثم احتفظ بها في مكان خاص وسلم الأمر تماماً." },
            { option: "طفلك الداخلي خائف من النتيجة", solution: "خصص 10 دقائق لجلسة تواصل مع طفلك الداخلي، وضع يدك على قلبك وطمئنه بالحب والأمان، وردد: 'أنت في أمان الآن، وأنا هنا لأحميك وأدعم خياراتك'." },
            { option: "تحتاج لتنظيف كارمي أولاً", solution: "ردد توكيد التسامح والتحرر 7 مرات بيقين: 'أنا أسمح لكل طاقة سلبية قديمة بالرحيل، وأتحرر من كل القيود والمخاوف، وأستقبل الوفرة والنور'." },
            { option: "هنالك طاقة حسد أو معيقات خارجية", solution: "قم بتبخير غرفتك أو مكان جلوسك بخشب الصندل أو الميرمية، مع فتح النوافذ لتجديد هواء المكان وطرد أي طاقات راكدة أو ثقيلة تؤثر على نيتك." },
            { option: "نعم، بالتأكيد!", solution: "ردد توكيد الامتنان هذا بيقين لاستقبال التجلي الحتمي: 'الحمد لله وشكراً للكون الذي ييسر لي أمنياتي برحمة ولطف، أنا ممتن ومستعد تماماً لاستقبال هذا الخير الوفير في حياتي المليئة باليسر والبركة والرفاهية'." },
            { option: "الحظ يدعمك الآن", solution: "بوابة الوفرة مفتوحة لك الآن؛ ردد توكيد الاستحقاق المالي والروحي بتركيز: 'طاقة الحظ العالي تتدفق إلى مساري بيسر، هيلتي جاذبة للفرص الممتازة والرفيعة، وأنا متناغم تماماً مع ذبذبات الغنى والتيسير'." }
        ];

        const totalItems = dataset.length;
        const arcSize = (2 * Math.PI) / totalItems;
        let isSpinning = false;
        let currentRotation = 0; // متغير لإصلاح تراكم زوايا الدوران ومنع عودة العجلة للخلف

        const palette = ["#130a24", "#1a0f33", "#221342", "#2b1854", "#180d2e", "#20113d", "#28154c"];

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = cx - 12;

            for (let i = 0; i < totalItems; i++) {
                const angle = i * arcSize;
                ctx.fillStyle = palette[i % palette.length];
                
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, angle, angle + arcSize);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = "rgba(212, 175, 55, 0.15)";
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "#f5f2ff";
                ctx.font = "bold 12px Tajawal";
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.translate(cx, cy);
                ctx.rotate(angle + arcSize / 2);
                
                let text = dataset[i].option;
                if(text.length > 28) text = text.substring(0, 26) + "..";
                
                ctx.fillText(text, radius - 28, 0);
                ctx.restore();
            }
        }

        function launchSpin() {
            if (isSpinning) return;

            isSpinning = true;
            oracleCard.style.display = "none";
            actionBtn.classList.add('disabled');
            actionBtn.innerText = "جاري الاتصال بقراءة الأقدار...";

            // توليد قيمة دوران إضافية تراكمية فخمة لضمان الحفاظ على انسيابية الدوران المستمر
            const randomDegrees = Math.floor(Math.random() * 360) + 2880; // 8 دورات إضافية كحد أدنى للمتعة والتشويق
            currentRotation += randomDegrees;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                actionBtn.classList.remove('disabled');
                actionBtn.innerText = "أدر العجلة مرة أخرى";

                // حساب النتيجة الدقيق والرياضي المتوافق تماماً مع إحداثيات السهم الذهبي العلوي (270 درجة)
                const actualDegrees = currentRotation % 360;
                const targetAngle = (360 - actualDegrees + 270) % 360;
                const finalIndex = Math.floor(targetAngle / (360 / totalItems)) % totalItems;
                
                const selectedData = dataset[finalIndex];

                verdictText.innerText = `🔮 ${selectedData.option}`;
                solutionText.innerText = selectedData.solution;
                oracleCard.style.display = "block";

                // تفعيل هزة خفيفة بالهاتف عبر ميزة اللمس الاهتزازي لتليجرام لزيادة التفاعل الفخم
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }

            }, 5000);
        }

        spinCore.addEventListener('click', launchSpin);
        actionBtn.addEventListener('click', launchSpin);

        drawWheel();
    </script>
</body>
</html>
