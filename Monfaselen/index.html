<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تاروت المنفصلين - Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0813;
            --bg-card: #151128;
            --gold-light: #fbe3b5;
            --gold-main: #d4af37;
            --gold-dark: #aa7c11;
            --purple-accent: #6b21a8;
            --purple-light: #a855f7;
            --text-light: #e2e8f0;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Amiri', serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(107, 33, 168, 0.25) 0%, transparent 70%),
                radial-gradient(circle at 50% 100%, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            background-attachment: fixed;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 1.8rem;
            color: var(--gold-main);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            margin-bottom: 8px;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: var(--text-dim);
        }

        /* Card Deck Area */
        .deck-container {
            position: relative;
            width: 100%;
            max-width: 340px;
            height: 270px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .tarot-card {
            width: 160px;
            height: 250px;
            background: linear-gradient(145deg, #1e1838, #110d24);
            border: 2px solid var(--gold-main);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7), 0 0 15px rgba(212, 175, 55, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            user-select: none;
        }

        .tarot-card::before {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px dashed rgba(212, 175, 55, 0.4);
            border-radius: 8px;
            pointer-events: none;
        }

        .card-back-pattern {
            width: 60px;
            height: 60px;
            border: 2px solid var(--gold-main);
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-back-pattern::after {
            content: '✦';
            color: var(--gold-light);
            font-size: 1.5rem;
            transform: rotate(-45deg);
        }

        .draw-btn {
            background: linear-gradient(135deg, var(--gold-main), var(--gold-dark));
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Reem Kufi', sans-serif;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }

        .draw-btn:active {
            transform: scale(0.96);
        }

        .draw-btn:disabled {
            background: #4a4a4a;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Reading Display Container */
        .reading-container {
            width: 100%;
            max-width: 650px;
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            padding: 22px;
            display: none;
            animation: fadeIn 0.8s ease-in-out forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .card-title {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 1.7rem;
            color: var(--gold-light);
        }

        .card-symbolism {
            font-size: 0.95rem;
            color: var(--gold-main);
            margin-top: 6px;
            font-style: italic;
        }

        .section-box {
            margin-bottom: 20px;
            background: rgba(10, 8, 19, 0.6);
            padding: 16px;
            border-radius: 10px;
            border-right: 3px solid var(--gold-main);
        }

        .section-box.healing {
            border-right-color: var(--purple-light);
            background: rgba(107, 33, 168, 0.12);
        }

        .section-title {
            font-family: 'Reem Kufi', sans-serif;
            color: var(--gold-main);
            font-size: 1.15rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title.healing-title {
            color: var(--purple-light);
        }

        .section-content {
            font-size: 1rem;
            line-height: 1.85;
            color: var(--text-light);
            text-align: justify;
        }

        .timer-msg {
            text-align: center;
            color: var(--gold-light);
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
            background: rgba(212, 175, 55, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        footer {
            margin-top: auto;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>✦ تاروت المنفصلين ✦</h1>
        <p class="subtitle">استبصار روحي وإرشاد لتشافي العلاقات والتأمل الباطني</p>

    <div class="deck-container">

        <div class="section-box">

            <div class="section-content" id="unifiedReading"></div>
        </div>

        <!-- الإرشاد والتوجيه -->
        <div class="section-box">
            <div class="section-title"><span>📜</span> الإرشاد والتوجيه الكوني</div>
            <div class="section-content" id="guidanceReading"></div>
        </div>

    <footer>
        جميع الحقوق محفوظة © تاروت المنفصلين الروحي

        // مصفوفات الرسائل الإضافية لدمج الاحتمالات ديناميكياً
        const dynamicCosmicMessages = [
            "الكون يرسل لك إشارة: التوافق الطاقي بينكما يتطلب منك إعادة بناء استقلالك أولاً.",
            "رسالة من مرشديك الروحيين: الصبر في هذه المرحلة يفتح لك أبواباً لم تكن تتوقعها.",
            "طاقة اليوم تدعوك لإغلاق الهاتف والارتباط بالطبيعة لاستعادة توازن هالتك.",
            "ملاحظة كونية: الروابط الأثيرية تمر بمرحلة إعادة ضبط شديدة، أتح لنفسك المساحة."
        ];

        // التحقق من الحد اليومي للسحب (24 ساعة)
        function checkDailyLimit() {
            const lastDraw = localStorage.getItem('last_tarot_draw');
            const drawBtn = document.getElementById('drawBtn');
            const timerMsg = document.getElementById('timerMsg');

            if (lastDraw) {
                const now = new Date().getTime();
                const timePassed = now - parseInt(lastDraw);
                const twentyFourHours = 24 * 60 * 60 * 1000;

                if (timePassed < twentyFourHours) {
                    const remainingTime = twentyFourHours - timePassed;
                    const hours = Math.floor(remainingTime / (1000 * 60 * 60));
                    const minutes = Math.floor((remainingTime % (1000 * 60 * 60)) / (1000 * 60));
                    
                    drawBtn.disabled = true;
                    drawBtn.innerText = "تم سحب بطاقة اليوم";
                    timerMsg.style.display = "block";
                    timerMsg.innerText = `عد بعد ${hours} ساعة و ${minutes} دقيقة لسحب بطاقتك التالية.`;
                    
                    const savedReading = localStorage.getItem('current_reading');
                    if (savedReading) {
                        displayReading(JSON.parse(savedReading));
                    }
                    return false;
                }
            }
            return true;
        }

        // دالة سحب البطاقة ودمج التفسيرات العشوائية
        function drawCard() {
            if (!checkDailyLimit()) return;

            const drawBtn = document.getElementById('drawBtn');
            const mainCard = document.getElementById('mainCard');
            
            // تأثير دوران البطاقة
            mainCard.style.transform = "rotateY(180deg) scale(1.05)";
            drawBtn.disabled = true;

            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * cardsData.length);
                let selectedCards = cardsData[randomIndex];

                // دمج رسالة كونية ديناميكية منعاً للتكرار
                const randomCosmicMsg = dynamicCosmicMessages[Math.floor(Math.random() * dynamicCosmicMessages.length)];
                
                const finalReading = {
                    ...selectedCards,
                    guidance: selectedCards.guidance + "\n\n✦ إرشاد اليوم: " + randomCosmicMsg
                };

                localStorage.setItem('last_tarot_draw', new Date().getTime().toString());
                localStorage.setItem('current_reading', JSON.stringify(finalReading));

                displayReading(finalReading);
                checkDailyLimit();
            }, 600);
        }

        // عرض القراءة في واجهة المستخدم
        function displayReading(data) {
            document.getElementById('cardName').innerText = data.name;
            document.getElementById('cardSymbolism').innerText = data.symbolism;
            document.getElementById('unifiedReading').innerText = data.unified;
            document.getElementById('guidanceReading').innerText = data.guidance;
            document.getElementById('healingReading').innerText = data.healing;

            const container = document.getElementById('readingContainer');
            container.style.display = "block";
            
            container.scrollIntoView({ behavior: 'smooth' });
        }

        // عند فتح التطبيق
        window.onload = function() {
            checkDailyLimit();
        };
    </script>
