<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة المعبد الهرمسي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background-color: #0d0a07;
      background-image: radial-gradient(circle at center, #1f1610 0%, #0d0a07 100%);
      color: #e5c185;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .gate-container {
      width: 100%;
      max-width: 450px;
      background: #1a1410;
      border: 2px solid #8c6d23;
      border-radius: 8px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    h2 { color: #e5c185; margin-bottom: 10px; font-size: 1.4rem; }
    p { color: #a49382; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    .btn-join {
      background: #2481cc;
      color: #fff;
      border: 1px solid #1d6fae;
    }
    .btn-join:hover { background: #1d6fae; }
    .btn-enter {
      background: #b87333;
      color: #fff;
      border: 1px solid #8c6d23;
      box-shadow: 0 4px 15px rgba(184, 115, 51, 0.2);
    }
    .btn-enter:hover { background: #9c5c24; }
  </style>
</head>
<body>

  <div class="gate-container">
    <h2>🔮 بوابة التحقق الروحية</h2>
    <p>مرحباً بك في رحاب هرمس. لتوجيه طاقة النية بشكل صحيح وضمان دقة قراءة التاروت، يرجى الاشتراك في قناتنا الروحية الخاصة أولاً لحماية الاتصال واستلاف الإشارات الدورية ✨</p>
    
    <!-- 1. رابط قناتك تم دمجه هنا وجاهز تماماً -->
    <a href="https://telegram.me/TanabouatTarot" class="btn btn-join" target="_blank">📢 الخطوة 1: اشترك في القناة من هنا</a>
    
    <!-- 2. رابط المعبد الأساسي لفتح السحب بعد الاشتراك -->
    <a href="https://jasontaing85-cyber.github.io/Tanaboattarot/Atefa-hermes/" class="btn btn-enter">🔮 الخطوة 2: دخول المعبد وسحب الكرت</a>
  </div>

</body>
</html>
