<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تاروت الفنجان الغجري الشهري</title>
    <style>
        :root {
            --bg-color: #0b071a;
            --gold: #d4af37;
            --purple: #2a1b4e;
            --text-color: #e0d7ff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }
        .header {
            margin-bottom: 30px;
        }
        h1 {
            color: var(--gold);
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        /* تصميم الفنجان الغجري المشوق */
        .cup-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
        }
        .cup {
            width: 100px;
            height: 80px;
            background: linear-gradient(135deg, #4a148c, #1a0033);
            border: 3px solid var(--gold);
            border-radius: 0 0 50px 50px;
            margin: 40px auto 0;
            position: relative;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
        }
        .cup::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 40px;
            border: 3px solid var(--gold);
            border-left: none;
            border-radius: 0 20px 20px 0;
            right: -33px;
            top: 15px;
        }
        .plate {
            width: 140px;
            height: 12px;
            background: var(--gold);
            margin: 0 auto;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .smoke {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            opacity: 0.7;
            animation: floatSmoke 3s infinite ease-in-out;
        }
        @keyframes floatSmoke {
            0% { transform: translate(-50%, 0) scale(0.8) blur(0px); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translate(-40%, -40px) scale(1.3) blur(2px); opacity: 0; }
        }

        /* شبكة الأوراق الإثني عشر */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            max-width: 500px;
            margin: 0 auto 30px;
        }
        .card {
            aspect-ratio: 2/3;
            background: linear-gradient(45deg, #1f1137, #3a1c6a);
            border: 2px solid var(--gold);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 0 15px var(--gold);
        }
        .card-inner {
            font-size: 1.8rem;
            color: var(--gold);
            opacity: 0.7;
        }

        /* نافذة النتيجة الموسعة والقراءة المفصلة */
        .result-container {
            display: none;
            background: linear-gradient(180deg, #1c103a, #0d061f);
            border: 3px solid var(--gold);
            border-radius: 20px;
            padding: 25px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-title {
            color: var(--gold);
            font-size: 1.6rem;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(214, 175, 55, 0.3);
            padding-bottom: 10px;
        }
        .reading-section {
            text-align: right;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 10px;
            border-right: 4px solid var(--gold);
        }
        .reading-section h3 {
            color: var(--gold);
            margin-top: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .reading-section p {
            line-height: 1.7;
            font-size: 0.95rem;
            margin: 5px 0 0;
        }
        .status-msg {
            color: #ff4a4a;
            font-weight: bold;
            margin: 15px 0;
            display: none;
        }
    </style>
</head>

    <div class="header">
        <h1>تاروت الفنجان الغجري الشهري</h1>
        <p>اقلب ورقتك السرية لتكشف ما يخبئه لك الفنجان هذا الشهر</p>

    </div>

        // دالة لتوليد الأوراق في الواجهة
        function generateCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => drawCard();
                card.innerHTML = `<div class="card-inner">✨</div>`;
                grid.appendChild(card);
            }
        }

        // دالة سحب الورقة والتحقق من شرط "مرة واحدة في الشهر"
        function drawCard() {
            const statusMsg = document.getElementById('statusMsg');
            const resultContainer = document.getElementById('resultContainer');
            
            // الحصول على التاريخ الحالي
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth(); // من 0 إلى 11

            // التحقق من التخزين المحلي لمتصفح المستخدم لشرط الشهر الواحد
            const lastDrawYear = localStorage.getItem('lastDrawYear');
            const lastDrawMonth = localStorage.getItem('lastDrawMonth');

            if (lastDrawYear && lastDrawMonth && 
                parseInt(lastDrawYear) === currentYear && 
                parseInt(lastDrawMonth) === currentMonth) {
                
                statusMsg.innerText = "⚠️ لقد قمت بسحب ورقتك لهذا الشهر بالفعل! انتظر حتى بداية الشهر القادم لتستشير الفنجان الغجري مجدداً.";
                statusMsg.style.display = 'block';
                return;
            }

            // سحب ورقة عشوائية بالكامل من الداتابيز الـ 12
            const randomIndex = Math.floor(Math.random() * gypsyCards.length);
            const selectedCard = gypsyCards[randomIndex];

            // عرض القراءة الموسعة والمفصلة في الواجهة
            document.getElementById('cardName').innerText = selectedCard.name;
            document.getElementById('spiritText').innerText = selectedCard.spirit;
            document.getElementById('wealthText').innerText = selectedCard.wealth;
            document.getElementById('loveText').innerText = selectedCard.love;
            document.getElementById('healthText').innerText = selectedCard.health;
            document.getElementById('guideText').innerText = selectedCard.guide;

            // إظهار حاوية النتيجة مع تأثير الأنيكيشن
            resultContainer.style.display = 'block';
            resultContainer.scrollIntoView({ behavior: 'smooth' });

            // حفظ تاريخ السحب في متصفح المستخدم لمنعه حتى الشهر الجديد
            localStorage.setItem('lastDrawYear', currentYear);
            localStorage.setItem('lastDrawMonth', currentMonth);
            
            // إخفاء رسائل الخطأ السابقة إن وجدت
            statusMsg.style.display = 'none';
        }

        // تشغيل توليد الأوراق فور تحميل الصفحة
        window.onload = function() {
            generateCards();
            
            // تحقق أولي لتعريف المستخدم بوضعه الحالي قبل السحب
            const now = new Date();
            const lastDrawYear = localStorage.getItem('lastDrawYear');
            const lastDrawMonth = localStorage.getItem('lastDrawMonth');
            if (lastDrawYear && lastDrawMonth && 
                parseInt(lastDrawYear) === now.getFullYear() && 
                parseInt(lastDrawMonth) === now.getMonth()) {
                document.getElementById('statusMsg').innerText = "🔮 لقد حصلت على قراءتك الغجرية لهذا الشهر بنجاح. عد في الشهر الجديد لمسار جديد!";
                document.getElementById('statusMsg').style.color = "#d4af37";
                document.getElementById('statusMsg').style.display = 'block';
            }
        };
    </script>
